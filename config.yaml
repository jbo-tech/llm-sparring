# Sparring Configuration
# Make your LLMs disagree.
# Copy to ~/.config/mcp/llm-sparring/config.yaml

# =============================================================================
# Models Configuration
# =============================================================================
# 
# Supported providers (all OpenAI-compatible endpoints):
#   - openai      → OPENAI_API_KEY
#   - anthropic   → ANTHROPIC_API_KEY (OpenAI-compat endpoint, no prompt caching)
#   - google      → GOOGLE_API_KEY (OpenAI-compat endpoint, beta)
#   - openrouter  → OPENROUTER_API_KEY (recommended: 400+ models, 1 key)
#   - mistral     → MISTRAL_API_KEY
#   - deepseek    → DEEPSEEK_API_KEY
#   - groq        → GROQ_API_KEY (fast inference)
#   - together    → TOGETHER_API_KEY
#   - xai         → XAI_API_KEY (Grok)
#   - moonshot    → MOONSHOT_API_KEY (Kimi)
#   - zai         → ZAI_API_KEY (z.ai)
#   - custom      → Any OpenAI-compatible endpoint
#
# Local (no key):
#   - ollama      → http://localhost:11434 (dedicated handler)

models:
  # Champs optionnels par modèle :
  #   default_max_tokens: 4000    # override global — utile pour reasoning models
  #   api_key: "..."              # override la clé d'env (provider=custom)
  #   base_url: "..."             # override l'endpoint du provider

  # ===========================================================================
  # OpenAI
  # ===========================================================================
  - name: "gpt-4o"
    provider: "openai"
    model_id: "gpt-4o"
    enabled: true

  - name: "gpt-4o-mini"
    provider: "openai"
    model_id: "gpt-4o-mini"
    enabled: true

  # gpt-5* et o-series utilisent automatiquement `max_completion_tokens` au
  # lieu de `max_tokens` (détection par préfixe dans providers.py).
  # Ils peuvent aussi consommer des reasoning_tokens invisibles — monter
  # default_max_tokens si besoin.
  # - name: "gpt-5-mini"
  #   provider: "openai"
  #   model_id: "gpt-5-mini"
  #   default_max_tokens: 4000
  #   enabled: true

  # ===========================================================================
  # Google Gemini
  # ===========================================================================
  - name: "gemini-flash"
    provider: "google"
    model_id: "gemini-2.0-flash"
    enabled: true
    
  - name: "gemini-pro"
    provider: "google"
    model_id: "gemini-1.5-pro"
    enabled: false

  # ===========================================================================
  # Mistral
  # ===========================================================================
  - name: "mistral-large"
    provider: "mistral"
    model_id: "mistral-large-latest"
    enabled: false
    
  - name: "mistral-small"
    provider: "mistral"
    model_id: "mistral-small-latest"
    enabled: true

  # ===========================================================================
  # DeepSeek
  # ===========================================================================
  - name: "deepseek-chat"
    provider: "deepseek"
    model_id: "deepseek-chat"
    enabled: true
    
  - name: "deepseek-reasoner"
    provider: "deepseek"
    model_id: "deepseek-reasoner"
    enabled: false

  # ===========================================================================
  # Groq (very fast inference)
  # ===========================================================================
  - name: "groq-llama"
    provider: "groq"
    model_id: "llama-3.3-70b-versatile"
    enabled: false
    
  - name: "groq-mixtral"
    provider: "groq"
    model_id: "mixtral-8x7b-32768"
    enabled: false

  # ===========================================================================
  # xAI (Grok)
  # ===========================================================================
  - name: "grok"
    provider: "xai"
    model_id: "grok-2-latest"
    enabled: false

  # ===========================================================================
  # OpenRouter (400+ models with one API key)
  # See: https://openrouter.ai/models
  # ===========================================================================
  - name: "or-mixtral"
    provider: "openrouter"
    model_id: "mistralai/mixtral-8x7b-instruct"
    enabled: true
    
  - name: "or-llama-70b"
    provider: "openrouter"
    model_id: "meta-llama/llama-3.1-70b-instruct"
    enabled: false
    
  - name: "or-qwen"
    provider: "openrouter"
    model_id: "qwen/qwen-2.5-72b-instruct"
    enabled: false

  # ===========================================================================
  # Anthropic (usually disabled since WE ARE Claude)
  # ===========================================================================
  - name: "claude-haiku"
    provider: "anthropic"
    model_id: "claude-3-5-haiku-20241022"
    enabled: false

  # ===========================================================================
  # Moonshot (Kimi)
  # ===========================================================================
  - name: "kimi"
    provider: "moonshot"
    model_id: "moonshot-v1-auto"
    enabled: false

  # ===========================================================================
  # z.ai (GLM)
  # ===========================================================================
  - name: "zai-glm"
    provider: "zai"
    model_id: "glm-4-plus"
    enabled: false

  # ===========================================================================
  # Local Models (Ollama)
  # Requires: ollama serve running locally
  # Pull models with: ollama pull llama3.2
  # ===========================================================================
  - name: "llama-local"
    provider: "ollama"
    model_id: "llama3.2"
    base_url: "http://localhost:11434"
    enabled: true
    
  - name: "qwen-local"
    provider: "ollama"
    model_id: "qwen2.5:3b"
    base_url: "http://localhost:11434"
    enabled: false
    
  - name: "mistral-local"
    provider: "ollama"
    model_id: "mistral"
    base_url: "http://localhost:11434"
    enabled: false
    
  - name: "phi-local"
    provider: "ollama"
    model_id: "phi3"
    base_url: "http://localhost:11434"
    enabled: false

  # ===========================================================================
  # Custom OpenAI-compatible endpoints
  # ===========================================================================
  # Example: Local vLLM, text-generation-webui, LM Studio, etc.
  #
  # - name: "local-vllm"
  #   provider: "custom"
  #   model_id: "mistralai/Mistral-7B-Instruct-v0.2"
  #   base_url: "http://localhost:8000/v1"
  #   enabled: true
  #   requires_auth: false  # Set to true if API key needed
  #
  # - name: "lm-studio"
  #   provider: "custom"
  #   model_id: "local-model"
  #   base_url: "http://localhost:1234/v1"
  #   enabled: true
  #   requires_auth: false


# =============================================================================
# Global Settings
# =============================================================================

settings:
  # Timeout for API calls (seconds)
  # Increase for slower models or high latency
  default_timeout: 30

  # Maximum parallel requests
  # Lower this if you hit rate limits
  max_parallel: 3

  # Budget tokens par défaut si ni l'appelant ni le modèle n'en fournissent.
  # Hard fallback interne = 2000. Monter si tu utilises surtout des reasoning
  # models (qwen, glm, o-series consomment 200-600 tokens en thinking invisible).
  # default_max_tokens: 2000

  # Circuit breaker (désactive un modèle après N erreurs consécutives).
  # Défauts : threshold=3, cooldown_seconds=300.
  # circuit_breaker:
  #   threshold: 3
  #   cooldown_seconds: 300


# =============================================================================
# Budget Configuration
# =============================================================================

budget:
  # Ask for confirmation if a single request exceeds this amount
  confirm_threshold: 0.10  # $0.10
  
  # Maximum spend per sparring session
  session_limit: 1.00  # $1.00
  
  # Maximum spend per day
  daily_limit: 5.00  # $5.00
  
  # File to track usage (created automatically)
  tracking_file: "~/.config/mcp/llm-sparring/usage.json"


# =============================================================================
# Custom Pricing (optional)
# =============================================================================
# Override pricing for specific models. Prix per 1M tokens.
#
# Le pricing par défaut vient de `pricing.json` (vendored depuis LiteLLM,
# ~2600 modèles). Refresh : `python scripts/refresh_pricing.py`.
# Utiliser cette section pour les modèles absents du JSON ou pour forcer un tarif.

# pricing:
#   my-custom-model:
#     input: 0.50
#     output: 1.50
#   or-some-openrouter-model:
#     input: 0.10
#     output: 0.30
